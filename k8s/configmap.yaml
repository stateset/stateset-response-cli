apiVersion: v1
kind: ConfigMap
metadata:
  name: stateset-response-gateway-config
  namespace: stateset-response
  labels:
    app: stateset-response-gateway
    app.kubernetes.io/name: stateset-response-gateway
    app.kubernetes.io/component: multi-channel-bot
data:
  NODE_ENV: "production"
  HOME: "/home/agent"
  PORT: "3000"
  STATESET_GATEWAY_HEALTH_PORT: "3000"
  STATESET_STATE_DIR: "/home/agent/.stateset"
  STATESET_ORG_ID: "replace-me"
  STATESET_ORG_NAME: "StateSet Response"
  STATESET_GRAPHQL_ENDPOINT: "https://response.stateset.app/v1/graphql"
  STATESET_MODEL: "claude-sonnet-4-6"
  STATESET_ALLOW_APPLY: "false"
  # Set to true only if the bot should execute state-changing operations.
  # SLACK_ALLOW: "U01234567,U07654321"
  # TELEGRAM_ALLOW: "123456789,987654321"
