# One of STATESET_CLI_TOKEN or STATESET_ADMIN_SECRET is required.
# Replace the empty values below or create the secret imperatively:
#   kubectl create secret generic stateset-response-gateway-secret \
#     --namespace=stateset-response \
#     --from-literal=ANTHROPIC_API_KEY=<key> \
#     --from-literal=STATESET_CLI_TOKEN=<token> \
#     --from-literal=SLACK_BOT_TOKEN=xoxb-... \
#     --from-literal=SLACK_APP_TOKEN=xapp-... \
#     --from-literal=TELEGRAM_BOT_TOKEN=<token>
apiVersion: v1
kind: Secret
metadata:
  name: stateset-response-gateway-secret
  namespace: stateset-response
  labels:
    app: stateset-response-gateway
type: Opaque
stringData:
  ANTHROPIC_API_KEY: ""
  STATESET_CLI_TOKEN: ""
  STATESET_ADMIN_SECRET: ""
  SLACK_BOT_TOKEN: ""
  SLACK_APP_TOKEN: ""
  TELEGRAM_BOT_TOKEN: ""
