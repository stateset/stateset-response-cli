# Replace STATESET_RESPONSE_CLI_IMAGE with a pushed container image before applying.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stateset-response-gateway
  namespace: stateset-response
  labels:
    app: stateset-response-gateway
    app.kubernetes.io/name: stateset-response-gateway
    app.kubernetes.io/component: multi-channel-bot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stateset-response-gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: stateset-response-gateway
        app.kubernetes.io/name: stateset-response-gateway
        app.kubernetes.io/component: multi-channel-bot
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      containers:
        - name: gateway
          image: STATESET_RESPONSE_CLI_IMAGE
          imagePullPolicy: IfNotPresent
          command: ["node", "./bin/stateset-gateway.js"]
          args: ["--no-whatsapp"]
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: stateset-response-gateway-config
            - secretRef:
                name: stateset-response-gateway-secret
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            failureThreshold: 10
            periodSeconds: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 20
          volumeMounts:
            - name: stateset-data
              mountPath: /home/agent/.stateset
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: stateset-data
          emptyDir: {}
